name: Build Windows EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Dependencies
        run: dotnet restore InventoryApp/InventoryApp.csproj

      - name: Build and Publish Standalone EXE
        run: |
          dotnet publish InventoryApp/InventoryApp.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true -o publish/

      - name: Upload Standalone EXE
        uses: actions/upload-artifact@v4
        with:
          name: InventoryApp-Standalone
          path: publish/InventoryApp.exe
